server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Encaminha as chamadas de API para o container do backend.
    # A porta vem da variável API_PORT (substituída pelo envsubst da imagem do
    # Nginx na subida do container), mantendo o proxy em sincronia com a API.
    location /api/ {
        proxy_pass http://api:${API_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
